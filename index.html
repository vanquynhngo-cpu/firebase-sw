<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>App Thông Báo - Đăng Nhập</title>

  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

    body {
      background: #f4f6f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .card {
      background: white;
      border-radius: 20px;
      padding: 32px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    }

    .logo {
      width: 60px; height: 60px;
      background: linear-gradient(135deg, #4f46e5 0%, #6366f1 100%);
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
    }
    .logo svg { width: 32px; height: 32px; fill: white; }

    h1 { font-size: 24px; font-weight: 700; color: #111; text-align: center; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #6b7280; text-align: center; margin-bottom: 28px; line-height: 1.5; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 8px; }
    .form-group input {
      width: 100%; padding: 14px 16px;
      border: 1px solid #d1d5db; border-radius: 12px;
      font-size: 15px; color: #111; background: #f9fafb;
      outline: none; transition: all 0.2s;
    }
    .form-group input:focus { border-color: #4f46e5; background: #fff; box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1); }

    /* Ẩn hiện phần Tên hiển thị khi chuyển tab */
    #nameGroup {
      display: none; /* Mặc định ẩn ở form Đăng nhập */
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #nameGroup.show {
      display: block;
      opacity: 1;
    }

    .btn {
      width: 100%; padding: 14px;
      background: #4f46e5; color: white;
      border: none; border-radius: 12px;
      font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 10px;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:hover  { background: #4338ca; }
    .btn:disabled { opacity: 0.7; cursor: not-allowed; }

    .switch-mode {
      text-align: center; margin-top: 24px; font-size: 14px; color: #6b7280;
    }
    .switch-mode a {
      color: #4f46e5; font-weight: 600; text-decoration: none; margin-left: 4px; cursor: pointer;
    }
    .switch-mode a:hover { text-decoration: underline; }

    /* Trạng thái */
    .status {
      margin-top: 20px; padding: 12px 16px;
      border-radius: 10px; font-size: 13px;
      display: none; line-height: 1.5; text-align: center; font-weight: 500;
    }
    .status.info    { background: #eff6ff; color: #1d4ed8; display: block; }
    .status.success { background: #f0fdf4; color: #15803d; display: block; }
    .status.error   { background: #fef2f2; color: #dc2626; display: block; }

    /* Thông báo nổi (Popup Foreground) */
    .popup {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%);
      z-index: 9999; background: white; border-radius: 16px;
      padding: 16px 20px; width: 90%; max-width: 360px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.15);
      border-bottom: 4px solid #4f46e5;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; gap: 14px; align-items: flex-start;
    }
    .popup.show { transform: translateX(-50%) translateY(0); }
    .popup-icon {
      width: 40px; height: 40px; border-radius: 12px;
      background: #ede9fe; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .popup-icon svg { width: 20px; height: 20px; fill: #4f46e5; }
    .popup-title { font-size: 15px; font-weight: 700; color: #111; margin-bottom: 4px; }
    .popup-body  { font-size: 14px; color: #555; line-height: 1.4; }
    .popup-close {
      position: absolute; top: 12px; right: 12px;
      background: none; border: none; font-size: 20px;
      color: #9ca3af; cursor: pointer; padding: 4px;
    }
  </style>
</head>
<body>

<div class="popup" id="popup">
  <div class="popup-icon">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </div>
  <div style="flex:1">
    <div class="popup-title" id="popup-title">Thông báo mới</div>
    <div class="popup-body"  id="popup-body">Nội dung thông báo</div>
  </div>
  <button class="popup-close" onclick="closePopup()">×</button>
</div>

<div class="card">
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </div>

  <h1 id="formTitle">Đăng nhập</h1>
  <p class="subtitle" id="formSubtitle">Vui lòng nhập thông tin để tiếp tục</p>

  <div class="form-group">
    <label>Số điện thoại</label>
    <input type="tel" id="phone" placeholder="Nhập SĐT của bạn" autocomplete="tel">
  </div>

  <div class="form-group">
    <label>Mật khẩu</label>
    <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password">
  </div>

  <div class="form-group" id="nameGroup">
    <label>Tên hiển thị</label>
    <input type="text" id="displayName" placeholder="Nhập tên của bạn" autocomplete="name">
  </div>

  <button class="btn" id="submitBtn" onclick="handleSubmit()">Đăng nhập ngay</button>

  <div class="status" id="status"></div>

  <div class="switch-mode">
    <span id="switchText">Chưa có tài khoản?</span>
    <a id="switchLink" onclick="toggleMode()">Đăng ký</a>
  </div>
</div>

<script>
// =============================================
// CẤU HÌNH & TRẠNG THÁI UI
// =============================================
let isLoginMode = true; // Mặc định là màn hình Đăng nhập

// API URL (Lấy từ Google Apps Script của bạn)
const GAS_API_URL = "https://script.google.com/macros/s/AKfycbyBEZUy4D8qCgrlqiOiua3HqjBaBkajGxThfIJicKKIB2J3Jh0p89qlv9Jkux2OWoFTpw/exec";

// Firebase Config
const firebaseConfig = {
  apiKey:            "AIzaSyCv_sjgaGsGsRgthyXGmE-eztH93RJlXUE",
  authDomain:        "thongbaocuochop-da595.firebaseapp.com",
  projectId:         "thongbaocuochop-da595",
  messagingSenderId: "361920499933",
  appId:             "1:361920499933:web:c994f744e2d64f0c6acb34"
};
const VAPID_KEY = "BNL5Qb8_WQlsWgsbgzWY8iSpPMHmWFoUklwF9r2dk6dZkf6rfj6C1bUkO-6n11EGxGilAjYh-sjsZw_WCpJvC4k";
const SW_URL = "./firebase-messaging-sw.js";

// Khởi tạo Firebase
firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();

// =============================================
// CHUYỂN ĐỔI UI (ĐĂNG NHẬP <-> ĐĂNG KÝ)
// =============================================
function toggleMode() {
  isLoginMode = !isLoginMode;
  const nameGroup = document.getElementById("nameGroup");
  
  if (isLoginMode) {
    nameGroup.classList.remove("show");
    document.getElementById("formTitle").textContent = "Đăng nhập";
    document.getElementById("submitBtn").textContent = "Đăng nhập ngay";
    document.getElementById("switchText").textContent = "Chưa có tài khoản?";
    document.getElementById("switchLink").textContent = "Đăng ký";
  } else {
    nameGroup.classList.add("show");
    document.getElementById("formTitle").textContent = "Đăng ký tài khoản";
    document.getElementById("submitBtn").textContent = "Tạo tài khoản";
    document.getElementById("switchText").textContent = "Đã có tài khoản?";
    document.getElementById("switchLink").textContent = "Đăng nhập";
  }
  
  // Xóa thông báo lỗi cũ nếu có
  document.getElementById("status").style.display = "none";
}

// =============================================
// XỬ LÝ GỬI FORM (ĐĂNG NHẬP / ĐĂNG KÝ)
// =============================================
async function handleSubmit() {
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();
  const displayName = document.getElementById("displayName").value.trim();

  // Validate Form
  if (!phone || !password) {
    showStatus("Vui lòng nhập SĐT và Mật khẩu!", "error");
    return;
  }
  if (!isLoginMode && !displayName) {
    showStatus("Vui lòng nhập Tên hiển thị để đăng ký!", "error");
    return;
  }

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.textContent = "Đang kết nối...";

  try {
    // 1. Cấp quyền nhận thông báo
    showStatus("Đang thiết lập thiết bị...", "info");
    const permission = await Notification.requestPermission();
    if (permission !== "granted") {
      throw new Error("Bạn đã từ chối nhận thông báo. Vui lòng bật lại trong cài đặt.");
    }

    // 2. Đăng ký Service Worker
    const swReg = await navigator.serviceWorker.register(SW_URL);
    await navigator.serviceWorker.ready;

    // 3. Lấy FCM Token từ Firebase
    const token = await messaging.getToken({
      vapidKey: VAPID_KEY,
      serviceWorkerRegistration: swReg
    });

    if (!token) throw new Error("Không thể tạo mã thiết bị. Thử lại sau.");

    // 4. Gửi dữ liệu lên Google Sheet (Backend)
    showStatus("Đang xử lý dữ liệu...", "info");
    const payload = {
      action: "saveToken",
      phone: phone,
      password: password,
      displayName: isLoginMode ? "" : displayName, // Login không cần gửi tên
      token: token
    };

    const response = await fetch(GAS_API_URL, {
      method: "POST",
      body: JSON.stringify(payload)
    });

    const result = await response.json();

    // Hoàn tất
    if (result.success) {
      const msgText = isLoginMode ? "✅ Đăng nhập thành công!" : "✅ Tạo tài khoản thành công!";
      showStatus(msgText + " Thiết bị đã sẵn sàng nhận thông báo.", "success");
      btn.textContent = isLoginMode ? "Đã đăng nhập" : "Đã đăng ký";
      
      // Popup Test
      setTimeout(() => {
        showPopup("Hệ thống", "Chào mừng bạn, cấu hình thông báo đã hoàn tất!");
      }, 1500);
    } else {
      throw new Error(result.error || "Có lỗi xảy ra từ máy chủ.");
    }

  } catch (err) {
    console.error(err);
    showStatus(err.message, "error");
    btn.disabled = false;
    btn.textContent = isLoginMode ? "Đăng nhập ngay" : "Tạo tài khoản";
  }
}

// =============================================
// XỬ LÝ THÔNG BÁO FOREGROUND
// =============================================
messaging.onMessage((payload) => {
  const { title, body } = payload.notification;
  showPopup(title, body);
});

// Hiển thị Popup góc trên
function showPopup(title, body) {
  document.getElementById("popup-title").textContent = title;
  document.getElementById("popup-body").textContent  = body;
  
  const popup = document.getElementById("popup");
  popup.classList.add("show");
  setTimeout(() => closePopup(), 5000);
}

function closePopup() {
  document.getElementById("popup").classList.remove("show");
}

function showStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent  = msg;
  el.className    = "status " + type;
}

// Kiểm tra trình duyệt
window.onload = () => {
  if (!("Notification" in window) || !("serviceWorker" in navigator)) {
    showStatus("Trình duyệt không hỗ trợ tính năng này.", "error");
    document.getElementById("submitBtn").disabled = true;
  }
};
</script>
</body>
</html>
