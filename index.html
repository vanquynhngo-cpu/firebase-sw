<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notification App</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 32px 28px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.10);
    }

    .logo {
      width: 52px; height: 52px;
      background: #4f46e5;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
    }
    .logo svg { width: 28px; height: 28px; fill: white; }

    h1 { font-size: 20px; font-weight: 600; color: #111; margin-bottom: 6px; }
    .subtitle { font-size: 14px; color: #666; margin-bottom: 28px; line-height: 1.5; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 13px; font-weight: 500; color: #444; margin-bottom: 6px; }
    .field input {
      width: 100%; padding: 10px 14px;
      border: 1.5px solid #e0e0e0; border-radius: 10px;
      font-size: 14px; color: #111; outline: none;
      transition: border-color 0.2s;
    }
    .field input:focus { border-color: #4f46e5; }

    .btn {
      width: 100%; padding: 13px;
      background: #4f46e5; color: white;
      border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; margin-top: 4px;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn:hover  { background: #4338ca; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Status box */
    .status {
      margin-top: 20px; padding: 14px 16px;
      border-radius: 10px; font-size: 14px;
      display: none; line-height: 1.5;
    }
    .status.info    { background: #eff6ff; color: #1d4ed8; display: block; }
    .status.success { background: #f0fdf4; color: #15803d; display: block; }
    .status.error   { background: #fef2f2; color: #dc2626; display: block; }

    /* Notification popup (foreground) */
    .popup {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      background: white; border-radius: 14px;
      padding: 16px 18px; max-width: 320px; width: 90%;
      box-shadow: 0 8px 32px rgba(0,0,0,0.15);
      border-left: 4px solid #4f46e5;
      transform: translateX(120%);
      transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; gap: 12px; align-items: flex-start;
    }
    .popup.show { transform: translateX(0); }
    .popup-icon {
      width: 36px; height: 36px; border-radius: 10px;
      background: #ede9fe; display: flex;
      align-items: center; justify-content: center; flex-shrink: 0;
    }
    .popup-icon svg { width: 18px; height: 18px; fill: #4f46e5; }
    .popup-title { font-size: 14px; font-weight: 600; color: #111; margin-bottom: 3px; }
    .popup-body  { font-size: 13px; color: #555; line-height: 1.4; }
    .popup-close {
      position: absolute; top: 10px; right: 12px;
      background: none; border: none; font-size: 18px;
      color: #999; cursor: pointer; line-height: 1;
    }

    /* Steps indicator */
    .steps {
      display: flex; gap: 8px; margin-bottom: 24px;
    }
    .step {
      flex: 1; height: 4px; border-radius: 2px;
      background: #e5e7eb; transition: background 0.3s;
    }
    .step.done    { background: #4f46e5; }
    .step.active  { background: #a5b4fc; }
  </style>
</head>
<body>

<!-- Notification popup (foreground) -->
<div class="popup" id="popup">
  <div class="popup-icon">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </div>
  <div style="flex:1">
    <div class="popup-title" id="popup-title">Thông báo mới</div>
    <div class="popup-body"  id="popup-body">Nội dung thông báo</div>
  </div>
  <button class="popup-close" onclick="closePopup()">×</button>
</div>

<!-- Main card -->
<div class="card">

  <!-- Steps -->
  <div class="steps">
    <div class="step active"  id="step1"></div>
    <div class="step"         id="step2"></div>
    <div class="step"         id="step3"></div>
  </div>

  <!-- Logo -->
  <div class="logo">
    <svg viewBox="0 0 24 24"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6V11c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
  </div>

  <h1>Bật thông báo</h1>
  <p class="subtitle">Nhập thông tin để nhận thông báo tự động trên thiết bị này.</p>

  <!-- Form -->
  <div class="field">
    <label>Tên của bạn</label>
    <input type="text" id="displayName" placeholder="Ví dụ: Nguyễn Văn A">
  </div>
  <div class="field">
    <label>Mã nhân viên / User ID</label>
    <input type="text" id="userId" placeholder="Ví dụ: NV001">
  </div>

  <button class="btn" id="registerBtn" onclick="registerNotification()">
    Bật thông báo ngay
  </button>

  <div class="status" id="status"></div>
</div>

<script>
// =============================================
// CẤU HÌNH — điền thông tin Firebase của bạn
// =============================================
const firebaseConfig = {
  apiKey:            "AIzaSyCv_sjgaGsGsRgthyXGmE-eztH93RJlXUE",
  authDomain:        "thongbaocuochop-da595.firebaseapp.com",
  projectId:         "thongbaocuochop-da595",
  messagingSenderId: "361920499933",
  appId:             "1:361920499933:web:c994f744e2d64f0c6acb34"
};

// VAPID Key từ Firebase Console → Cloud Messaging → Web Push certificates
const VAPID_KEY = "BNL5Qb8_WQlsWgsbgzWY8iSpPMHmWFoUklwF9r2dk6dZkf6rfj6C1bUkO-6n11EGxGilAjYh-sjsZw_WCpJvC4k";

// URL file Service Worker đã host trên GitHub Pages (bước 2)
const SW_URL = "./firebase-messaging-sw.js"; // Hoặc "/firebase-sw/firebase-messaging-sw.js"

// =============================================
// KHỞI TẠO FIREBASE
// =============================================
firebase.initializeApp(firebaseConfig);
const messaging = firebase.messaging();

// =============================================
// HÀM CHÍNH — ĐĂNG KÝ NHẬN THÔNG BÁO
// =============================================
async function registerNotification() {
  const userId      = document.getElementById("userId").value.trim();
  const displayName = document.getElementById("displayName").value.trim();

  // Validate
  if (!userId || !displayName) {
    showStatus("Vui lòng điền đầy đủ thông tin!", "error");
    return;
  }

  const btn = document.getElementById("registerBtn");
  btn.disabled   = true;
  btn.textContent = "Đang xử lý...";
  setStep(1);

  try {
    // Bước 1 — Xin quyền thông báo từ trình duyệt
    showStatus("Đang xin quyền thông báo...", "info");
    const permission = await Notification.requestPermission();

    if (permission !== "granted") {
      showStatus("Bạn đã từ chối thông báo. Vào Settings trình duyệt để bật lại.", "error");
      resetBtn();
      return;
    }

    setStep(2);

    // Bước 2 — Đăng ký Service Worker từ GitHub Pages
    showStatus("Đang đăng ký service worker...", "info");
    const swReg = await navigator.serviceWorker.register(SW_URL);
    await navigator.serviceWorker.ready;

    // Bước 3 — Lấy FCM Token
    showStatus("Đang lấy token thiết bị...", "info");
    const token = await messaging.getToken({
      vapidKey:                    VAPID_KEY,
      serviceWorkerRegistration:   swReg
    });

    if (!token) {
      showStatus("Không lấy được token. Thử lại sau.", "error");
      resetBtn();
      return;
    }

    setStep(3);

    // Bước 4 — Gửi token lên Apps Script lưu vào Sheet
    // Thay thế đoạn google.script.run bằng:
    showStatus("Đang lưu thông tin lên hệ thống...", "info");
    const gasApiUrl = "https://script.google.com/macros/s/AKfycbyrpWU_yoQT1hNppkh_DvM--rgAnnoQP_TDgHLg5OmvT_WLexfUgVD6QqbKHgBMfiNHhA/exec";
    
    const response = await fetch(gasApiUrl, {
      method: "POST",
      body: JSON.stringify({
        action: "saveToken",
        userId: userId,
        token: token,
        displayName: displayName
      })
    });

const result = await response.json();
if(result.success) {
    showStatus("✅ Bật thông báo thành công!", "success");
}

    // Thành công!
    showStatus(
      "✅ Bật thông báo thành công! Thiết bị này sẽ nhận thông báo tự động.",
      "success"
    );
    btn.textContent = "✅ Đã bật thông báo";

    // Test popup foreground
    setTimeout(() => {
      showPopup("Chào " + displayName + "!", "Bạn sẽ nhận thông báo tự động từ bây giờ.");
    }, 1000);

  } catch (err) {
    console.error(err);
    showStatus("Lỗi: " + err.message, "error");
    resetBtn();
  }
}

// =============================================
// XỬ LÝ THÔNG BÁO KHI APP ĐANG MỞ (FOREGROUND)
// =============================================
messaging.onMessage((payload) => {
  console.log("Nhận thông báo foreground:", payload);
  const { title, body } = payload.notification;
  showPopup(title, body);
});

// =============================================
// HIỆN POPUP THÔNG BÁO (FOREGROUND)
// =============================================
function showPopup(title, body) {
  document.getElementById("popup-title").textContent = title;
  document.getElementById("popup-body").textContent  = body;
  
  const popup = document.getElementById("popup");
  popup.classList.add("show");

  // Tự ẩn sau 5 giây
  setTimeout(() => closePopup(), 5000);
}

function closePopup() {
  document.getElementById("popup").classList.remove("show");
}

// =============================================
// HELPERS
// =============================================
function showStatus(msg, type) {
  const el = document.getElementById("status");
  el.textContent  = msg;
  el.className    = "status " + type;
}

function resetBtn() {
  const btn = document.getElementById("registerBtn");
  btn.disabled    = false;
  btn.textContent = "Bật thông báo ngay";
}

function setStep(n) {
  ["step1","step2","step3"].forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = "step " + (i < n ? "done" : i === n ? "active" : "");
  });
}

// Kiểm tra trình duyệt có hỗ trợ không
window.onload = () => {
  if (!("Notification" in window)) {
    showStatus("Trình duyệt này không hỗ trợ thông báo. Dùng Chrome hoặc Edge.", "error");
    document.getElementById("registerBtn").disabled = true;
  }
  if (!("serviceWorker" in navigator)) {
    showStatus("Trình duyệt này không hỗ trợ Service Worker.", "error");
    document.getElementById("registerBtn").disabled = true;
  }
};
</script>
</body>
</html>
